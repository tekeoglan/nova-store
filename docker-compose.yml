services:
  backend:
    build:
      context: ./backend
    container_name: novastore-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - WEB_URL=http://localhost:3000
    volumes:
      - novastore-db:/app/database
    networks:
      - novastore-net
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    container_name: novastore-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - novastore-net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  novastore-net:
    driver: bridge

volumes:
  novastore-db:
